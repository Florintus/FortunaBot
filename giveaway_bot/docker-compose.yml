version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: giveaway_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: giveaway_bot
    restart: always
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      # Явная подстановка из того же .env, что и env_file (каталог compose).
      # Если Twitch «не настроен», проверьте, что эти ключи есть в .env рядом с compose.
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./bot:/app/bot
      - ./media:/app/media

volumes:
  postgres_data:


